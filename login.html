<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏙️</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title >Login — CivicFix</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-box">
  <a href="index.html" class="auth-logo">
    <div class="logo-icon">🏙️</div>
    <span style="font-family: 'Roboto', sans-serif; font-size: 2.5rem; color: #36dfc3;">Civic<em>Fix</em></span>
  </a>

  <h1 class="auth-title" style="font-family: 'Roboto', sans-serif; font-size: 2.5rem; color: #d290be;">Welcome back</h1>
  <p class="auth-sub">Login to track and manage your complaints.</p>

  <div id="alertBox"></div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">
    Sign In
  </button>

  <!-- Quick demo logins -->
  <div class="divider"></div>
  <p style="font-size:.78rem;color:var(--text-dim);text-align:center;margin-bottom:.75rem;">DEMO ACCOUNTS</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;">
    <button class="btn btn-secondary btn-sm" onclick="fillDemo('user@civicfix.com','user123')">
      👤 Citizen Login
    </button>
    <button class="btn btn-secondary btn-sm" onclick="fillDemo('admin@civicfix.com','admin123')">
      🛡️ Admin Login
    </button>
  </div>

  <div class="auth-footer">
    Don't have an account? <a href="register.html">Create one free</a>
  </div>
</div>

<script>
function showAlert(msg, type='error') {
  const icons = { error: '⚠️', success: '✅', info: 'ℹ️' };
  document.getElementById('alertBox').innerHTML =
    `<div class="alert alert-${type}">${icons[type]} ${msg}</div>`;
}

function fillDemo(email, pass) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = pass;
}

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');

  if (!email || !password) { showAlert('Please fill in all fields.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in…';

  try {
    const res  = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) { showAlert(data.error || 'Login failed.'); return; }

    showAlert('Login successful! Redirecting…', 'success');
    setTimeout(() => {
      window.location.href = data.user.role === 'admin'
        ? 'admin_dashboard.html'
        : 'user_dashboard.html';
    }, 700);
  } catch {
    showAlert('Network error. Is the Flask server running?');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Sign In';
  }
}

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
